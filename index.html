<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTClan 실시간 전적 랭킹 사이트</title>
    <style>
        body { background-color: #2f3136; color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 200px; background-color: #202225; padding: 20px 10px; border-right: 1px solid #40444b; shrink: 0; }
        .sidebar-title { font-size: 16px; font-weight: bold; color: #e5c07b; text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #40444b; }
        .menu-title { font-size: 12px; color: #8e9297; font-weight: bold; margin: 15px 0 5px 5px; text-transform: uppercase; }
        .menu-btn { display: block; width: 100%; background: none; border: none; color: #b9bbbe; text-align: left; padding: 10px; font-size: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .menu-btn:hover { background-color: #34373c; color: #fff; }
        .menu-btn.active { background-color: #5865f2; color: #fff; }
        .hidden { display: none !important; }
        .main-content { flex: 1; padding: 15px 20px; padding-bottom: 80px; position: relative; }
        .main-header { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .main-desc { font-size: 14px; color: #b9bbbe; margin-bottom: 15px; }
        .stat-table { width: 100%; border-collapse: collapse; text-align: center; }
        .stat-table th, .stat-table td { padding: 10px 5px; font-size: 13px; border-bottom: 1px solid #40444b; }
        .stat-table th:nth-child(1), .stat-table td:nth-child(1) { width: 22%; }
        .stat-table th:nth-child(2), .stat-table td:nth-child(2) { width: 34%; }
        .bg-rank-1 { background-color: rgba(241, 196, 15, 0.08); }
        .bg-rank-2 { background-color: rgba(149, 165, 166, 0.08); }
        .bg-rank-3 { background-color: rgba(211, 84, 0, 0.08); }
        .medal { font-size: 16px; }
        .champion-trophy { color: #f1c40f; margin-left: 5px; font-size: 14px; font-weight: bold; letter-spacing: -2px; }
        .visitor-counter { position: fixed; bottom: 15px; right: 15px; background-color: #202225; border: 1px solid #40444b; padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #b9bbbe; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); z-index: 999; text-align: right; line-height: 1.5; }
        .visitor-counter span { font-weight: bold; }
        .visitor-counter .today { color: #43b581; }
        .visitor-counter .total { color: #e5c07b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">★ BT CLAN ★</div>
        <div class="menu-title">시즌 랭킹 판</div>
        <button class="menu-btn active" id="btn-current" onclick="selectCategory('current')">🔥 2026 하반기 실시간</button>
        <button class="menu-btn hidden" id="btn-prev" onclick="selectCategory('prev')">📜 2026 상반기 최종</button>
    </div>

    <div class="main-content">
        <div class="main-header" id="page-title"># BT클랜원 시즌 랭킹</div>
        <div class="main-desc">포인트가 높은 순서대로 정렬됩니다. (판수가 있으면 마이너스 점수라도 0승 0패보다 우위)</div>

        <table class="stat-table">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>닉네임</th>
                    <th>승</th>
                    <th>패</th>
                    <th>승률</th>
                    <th>포인트</th>
                </tr>
            </thead>
            <tbody id="ranking-table-body"></tbody>
        </table>
    </div>

    <div class="visitor-counter">
        <div>조회수 계측기</div>
        <div>오늘 방문: <span id="count-today" class="today">1</span></div>
        <div>전체 방문: <span id="count-total" class="total">1</span></div>
    </div>

    <script>
        let viewMode = 'current';
        let champions = { firstHalf: "", secondHalf: "" };

        // ---------------------------------------------------------
        // 1. [🔥 하반기 전적] 7월 1일부터 새로 쌓이는 하반기 전적은 여기!
        // ---------------------------------------------------------
        const clanMembers = [
            [ "SapziL[BT]", 0, 0 ], [ "Sun[BT]", 0, 0 ], [ "Unique[BT]", 0, 0 ], [ "Kyu[BT]", 0, 0 ], [ "Pirate[BT]", 0, 0 ],
            [ "HanJin[BT]", 0, 0 ], [ "JAVA[BT]", 0, 0 ], [ "zzerg[BT]", 0, 0 ], [ "heajin[BT]", 0, 0 ], [ "Lattee[BT]", 0, 0 ],
            [ "Ocean[BT]", 0, 0 ], [ "Sunbee[BT]", 0, 0 ], [ "Chu[BT]", 0, 0 ], [ "Dkey[BT]", 0, 0 ], [ "Ulrali[BT]", 0, 0 ],
            [ "Min[BT]", 0, 0 ], [ "Hunt[BT]", 0, 0 ], [ "ohno~[BT]", 1, 0 ], [ "gnl[BT]", 0, 0 ], [ "rAy[BT]", 0, 0 ],
            [ "rjrl[BT]", 0, 0 ], [ "Helper[BT]", 0, 0 ], [ "OK[BT]", 0, 0 ], [ "Grit[BT]", 0, 0 ], [ "5s[BT]", 0, 0 ],
            [ "Zec[BT]", 1, 0 ], [ "02[BT]", 0, 0 ], [ "2[BT]", 0, 0 ], [ "Sang[BT]", 0, 0 ], [ "elca[BT]", 0, 0 ],
            [ "JK[BT]", 0, 0 ], [ "Pong9[BT]", 0, 0 ], [ "Jusin[BT]", 0, 0 ], [ "Mom[BT]", 0, 1 ], [ "waassup[BT]", 0, 0 ],
            [ "ILDO[BT]", 0, 0 ], [ "dodo[BT]", 0, 0 ], [ "Sharp1[BT]", 0, 0 ], [ "Saske[BT]", 0, 0 ], [ "gkawnf[BT]", 0, 0 ],
            [ "GGUNG[BT]", 0, 0 ], [ "Epic[BT]", 0, 0 ], [ "dhfl[BT]", 0, 0 ], [ "wisa[BT]", 0, 0 ], [ "hsy[BT]", 0, 0 ],
            [ "Hana[BT]", 0, 0 ], [ "911[BT]", 0, 0 ], [ "Yellow[BT]", 0, 0 ], [ "c[BT]", 0, 0 ], [ "Janbari[BT]", 0, 0 ],
            [ "eodrn[BT]", 0, 0 ], [ "st[BT]", 0, 0 ], [ "tamoo[BT]", 0, 0 ], [ "YiTA[BT]", 0, 0 ], [ "Nature[BT]", 0, 0 ],
            [ "Cherry+[BT]", 0, 0 ], [ "gus[BT]", 0, 0 ], [ "k0res[BT]", 1, 0 ], [ "gns[BT]", 0, 0 ], [ "gun[BT]", 0, 0 ],
            [ "Peri[BT]", 0, 0 ], [ "wns[BT]", 0, 0 ], [ "Sorry[BT]", 0, 1 ], [ "mikseogi[BT]", 0, 0 ], [ "Cuzz[BT]", 0, 0 ],
            [ "UT[BT]", 0, 0 ], [ "Like[BT]", 0, 0 ], [ "Sniper[BT]", 0, 0 ], [ "Melo[BT]", 0, 0 ], [ "Boy[BT]", 0, 0 ],
            [ "Visage[BT]", 0, 0 ], [ "1[BT]", 0, 0 ], [ "EunGyo[BT]", 0, 0 ], [ "qktkr[BT]", 0, 0 ], [ "KimGeoMi[BT]", 0, 0 ],
            [ "RINKING[BT]", 0, 1 ], [ "Tenga[BT]", 0, 0 ], [ "Guramis[BT]", 0, 0 ]
        ];

        // ---------------------------------------------------------
        // 2. [📜 2026 상반기 최종 데이터] 누락된 6명은 여기서 직접 수정!!
        // ---------------------------------------------------------
        const firstHalfFinal = [
            [ "02[BT]", 8, 4 ], [ "dhfl[BT]", 4, 0 ], [ "Hana[BT]", 5, 3 ], [ "Tenga[BT]", 5, 3 ], [ "ohno~[BT]", 6, 5 ],
            [ "k0res[BT]", 4, 2 ], [ "RINKING[BT]", 4, 3 ], [ "elca[BT]", 4, 5 ], [ "Zec[BT]", 6, 9 ], [ "Pirate[BT]", 2, 1 ],
            [ "wns[BT]", 3, 1 ], [ "Sorry[BT]", 3, 3 ], [ "Lattee[BT]", 1, 0 ], [ "gnl[BT]", 1, 0 ], [ "Saske[BT]", 1, 0 ],
            [ "GGUNG[BT]", 1, 0 ], [ "c[BT]", 3, 2 ], [ "Sunbee[BT]", 3, 4 ], [ "tamoo[BT]", 2, 3 ], [ "Ulrali[BT]", 1, 2 ],
            [ "st[BT]", 1, 2 ], [ "Helper[BT]", 1, 3 ], [ "Unique[BT]", 0, 1 ], [ "HanJin[BT]", 0, 1 ], [ "YiTA[BT]", 0, 1 ],
            [ "mikseogi[BT]", 0, 1 ], [ "UT[BT]", 0, 1 ], [ "rAy[BT]", 1, 5 ], [ "Mom[BT]", 1, 4 ], [ "Dkey[BT]", 0, 3 ],
            [ "SapziL[BT]", 0, 0 ], [ "Sun[BT]", 0, 0 ], [ "Kyu[BT]", 0, 0 ], [ "JAVA[BT]", 0, 0 ], [ "zzerg[BT]", 0, 0 ],
            [ "heajin[BT]", 0, 0 ], [ "Ocean[BT]", 0, 0 ], [ "Chu[BT]", 0, 0 ], [ "Min[BT]", 0, 0 ], [ "Hunt[BT]", 0, 0 ],
            [ "rjrl[BT]", 0, 0 ], [ "OK[BT]", 0, 0 ], [ "Grit[BT]", 0, 0 ], [ "5s[BT]", 0, 0 ], [ "2[BT]", 0, 0 ],
            [ "Sang[BT]", 0, 0 ], [ "JK[BT]", 0, 0 ], [ "Pong9[BT]", 0, 0 ], [ "Jusin[BT]", 0, 0 ], [ "waassup[BT]", 0, 0 ],
            [ "ILDO[BT]", 0, 0 ], [ "dodo[BT]", 0, 0 ], [ "Sharp1[BT]", 0, 0 ], [ "gkawnf[BT]", 0, 0 ], [ "Epic[BT]", 0, 0 ],
            [ "wisa[BT]", 0, 0 ], [ "hsy[BT]", 0, 0 ], [ "911[BT]", 0, 0 ], [ "Yellow[BT]", 0, 0 ], [ "Janbari[BT]", 0, 0 ],
            [ "eodrn[BT]", 0, 0 ], [ "Nature[BT]", 0, 0 ], [ "Cherry+[BT]", 0, 0 ], [ "gus[BT]", 0, 0 ], [ "gns[BT]", 0, 0 ],
            [ "gun[BT]", 0, 0 ], [ "Peri[BT]", 0, 0 ], [ "Cuzz[BT]", 1, 0 ], [ "Like[BT]", 0, 0 ], [ "Sniper[BT]", 0, 0 ],
            [ "Melo[BT]", 0, 0 ], [ "Boy[BT]", 0, 0 ], [ "Visage[BT]", 0, 0 ], [ "1[BT]", 0, 0 ], [ "EunGyo[BT]", 0, 0 ],
            [ "qktkr[BT]", 0, 0 ], [ "KimGeoMi[BT]", 0, 0 ], [ "Guramis[BT]", 0, 0 ]
        ];

        function getRankData() {
            const now = new Date();
            const year = now.getFullYear();
            const isSecondHalf = now.getMonth() >= 6; 

            champions.firstHalf = calcWinner(firstHalfFinal);
            if (year > 2026) { champions.secondHalf = calcWinner(clanMembers); }

            let targetData = clanMembers;
            if (isSecondHalf && viewMode === 'prev') {
                targetData = firstHalfFinal;
            }

            return targetData.map(member => {
                const name = member[0]; const wins = member[1]; const loses = member[2]; const total = wins + loses;
                const winRate = total === 0 ? 0 : parseFloat(((wins / total) * 100).toFixed(1));
                const points = (wins * 100) + (loses * -50); 
                return { name, wins, loses, winRate, points, total };
            });
        }

        function calcWinner(dataArray) {
            const parsed = dataArray.map(m => {
                const total = m[1] + m[2];
                return { name: m[0], total, points: (m[1] * 100) + (m[2] * -50), winRate: total === 0 ? 0 : m[1]/total };
            });
            parsed.sort((a, b) => {
                if (a.total > 0 && b.total > 0) { if (b.points !== a.points) return b.points - a.points; return b.winRate - a.winRate; }
                if (a.total > 0 && b.total === 0) return -1; if (b.total > 0 && a.total === 0) return 1; return 0;
            });
            return (parsed.length > 0 && parsed[0].total > 0) ? parsed[0].name : "";
        }

        function renderRanking() {
            const now = new Date();
            const year = now.getFullYear();
            const isSecondHalf = now.getMonth() >= 6;

            const btnCurrent = document.getElementById('btn-current');
            const btnPrev = document.getElementById('btn-prev');
            const titleEl = document.getElementById('page-title');

            if (!isSecondHalf && year === 2026) {
                btnCurrent.innerText = "🔥 2026 상반기 실시간";
                btnPrev.classList.add('hidden');
                titleEl.innerText = "# BT클랜원 시즌 랭킹 (2026 상반기)";
            } else {
                const curName = isSecondHalf ? `${year} 하반기` : `${year} 상반기`;
                const prevName = isSecondHalf ? `${year} 상반기` : `${year-1} 하반기`;

                btnCurrent.innerText = `🔥 ${curName} 실시간`;
                btnPrev.innerText = `📜 ${prevName} 최종`;
                btnPrev.classList.remove('hidden');

                if (viewMode === 'current') titleEl.innerText = `# BT클랜원 시즌 랭킹 (${curName})`;
                if (viewMode === 'prev') titleEl.innerText = `# BT클랜원 지난 시즌 랭킹 (${prevName} 최종 명예의 전당)`;
            }

            const processed = getRankData();

            processed.sort((a, b) => {
                if (a.total > 0 && b.total > 0) { if (b.points !== a.points) return b.points - a.points; return b.winRate - a.winRate; }
                if (a.total > 0 && b.total === 0) return -1; if (b.total > 0 && a.total === 0) return 1; return 0;
            });

            const tbody = document.getElementById('ranking-table-body');
            tbody.innerHTML = ''; 

            processed.forEach((member, index) => {
                const rank = index + 1;
                let rowClass = ''; let rankText = rank;

                if (rank === 1) { rowClass = 'bg-rank-1'; rankText = '<span class="medal">🥇</span> 1'; } 
                else if (rank === 2) { rowClass = 'bg-rank-2'; rankText = '<span class="medal">🥈</span> 2'; } 
                else if (rank === 3) { rowClass = 'bg-rank-3'; rankText = '<span class="medal">🥉</span> 3'; }

                const pointColor = member.points >= 0 ? '#e5c07b' : '#ff6b6b';

                let trophyHtml = "";
                if (viewMode === 'current') {
                    let trophyCount = 0;
                    if (isSecondHalf && member.name === champions.firstHalf) { trophyCount++; }
                    if (year > 2026 && member.name === champions.secondHalf) { trophyCount++; }

                    if (trophyCount === 1) { trophyHtml = '<span class="champion-trophy" title="디펜딩 챔피언">🏆</span>'; } 
                    else if (trophyCount === 2) { trophyHtml = '<span class="champion-trophy" title="★ 통합 왕좌 ★">🏆🏆</span>'; }
                }

                const row = `
                    <tr class="${rowClass}">
                        <td style="font-weight: bold; color: #fff;">${rankText}</td>
                        <td style="text-align: left; font-weight: 500; color: #f2f3f5;">${member.name}${trophyHtml}</td>
                        <td style="color: #43b581; font-weight: bold;">${member.wins}</td>
                        <td style="color: #f04747;">${member.loses}</td>
                        <td style="color: #5865f2; font-weight: bold;">${member.winRate}%</td>
                        <td style="color: ${pointColor}; font-weight: bold;">${member.points.toLocaleString()} pt</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function selectCategory(mode) {
            viewMode = mode;
            document.getElementById('btn-current').classList.remove('active');
            document.getElementById('btn-prev').classList.remove('active');
            if(mode === 'current') document.getElementById('btn-current').classList.add('active');
            if(mode === 'prev') document.getElementById('btn-prev').classList.add('active');
            renderRanking();
        }

        function updateCounter() {
            let totalViews = localStorage.getItem('bt_total_views') || 24;
            let todayViews = localStorage.getItem('bt_today_views') || 3;
            let lastDate = localStorage.getItem('bt_last_date');
            const now = new Date();
            const currentDate = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
            if (lastDate !== currentDate) { todayViews = 0; localStorage.setItem('bt_last_date', currentDate); }
            totalViews = parseInt(totalViews) + 1; todayViews = parseInt(todayViews) + 1;
            localStorage.setItem('bt_total_views', totalViews); localStorage.setItem('bt_today_views', todayViews);
            document.getElementById('count-today').innerText = todayViews.toLocaleString();
            document.getElementById('count-total').innerText = totalViews.toLocaleString();
        }
        
        window.onload = function() { renderRanking(); updateCounter(); };
    </script>
</body>
</html>
