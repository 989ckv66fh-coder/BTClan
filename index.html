<!DOCTYPE html>
<html lang="ko">
<head>
    https://989ckv66fh-coder.github.iobtclan/naver130e7144353356d9ac7eddc8322755a3.htm
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클랜원 실시간 전적 랭킹</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '맑은 고딕'; 
            display: flex; height: 100vh; 
            background-color: #313338; color: #dbdee1; overflow: hidden; 
        }
        
        /* 왼쪽 사이드바 (디스코드 채널 스타일) */
        .sidebar { 
            width: 240px; background-color: #2b2d31; 
            display: flex; flex-direction: column; padding: 10px; 
            border-right: 1px solid #1f2023; flex-shrink: 0;
        }
        .server-title { font-weight: bold; color: #f2f3f5; padding: 12px 10px; border-bottom: 1px solid #1f2023; margin-bottom: 15px; font-size: 16px; }
        .category { font-size: 12px; font-weight: bold; color: #949ba4; margin: 15px 0 5px 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .channel { padding: 8px 10px; border-radius: 4px; color: #949ba4; text-decoration: none; display: block; margin-bottom: 2px; font-size: 15px; }
        .channel.active { background-color: #404249; color: #f2f3f5; font-weight: 500; }

        /* 가운데 메인 화면 (전적 랭킹판) */
        .main-content { flex: 1; padding: 25px 20px; overflow-y: auto; background-color: #313338; }
        .main-header { font-size: 24px; font-weight: bold; color: #f2f3f5; margin-bottom: 8px; padding-bottom: 12px; border-bottom: 1px solid #3f4147; }
        .main-desc { color: #b5bac1; font-size: 13px; margin-bottom: 20px; }
        
        /* 랭킹 테이블 스타일 */
        .stat-table { 
            width: 100%; border-collapse: collapse; margin-top: 15px; 
            background-color: #2b2d31; border-radius: 8px; overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .stat-table th, .stat-table td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #3f4147; }
        .stat-table th { background-color: #1e1f22; color: #f2f3f5; font-weight: 600; font-size: 14px; }
        .stat-table td { font-size: 14px; }
        
        /* 🥇 2등, 3등 메달 및 배경 효과 */
        .rank-1 { color: #f0b232; font-weight: bold; } 
        .rank-2 { color: #f2f3f5; font-weight: bold; } 
        .rank-3 { color: #cd7f32; font-weight: bold; } 
        
        /* 상위권 줄 하이라이트 효과 */
        .bg-rank-1 { background-color: rgba(240, 178, 50, 0.05); }
        .bg-rank-2 { background-color: rgba(242, 243, 245, 0.03); }
        .bg-rank-3 { background-color: rgba(205, 127, 50, 0.03); }

        /* 🔥 핸드폰(모바일) 전용 화면 최적화 세팅 */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { display: none; } /* 핸드폰에서는 왼쪽 메뉴를 과감히 숨김 */
            .main-content { padding: 15px 10px; }
            .main-header { font-size: 20px; }
            .stat-table th, .stat-table td { padding: 10px 5px; font-size: 13px; }
            .stat-table th:nth-child(1), .stat-table td:nth-child(1) { width: 22%; } /* 순위칸 너비조절 */
            .stat-table th:nth-child(2), .stat-table td:nth-child(2) { width: 34%; } /* 닉네임칸 너비조절 */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="server-title">🏆 클랜 전적 관리 시스템</div>
        <div class="category">📊 ┃ RANKING</div>
        <a href="#" class="channel active"># 클랜원-전체랭킹</a>
    </div>

    <div class="main-content">
        <div class="main-header"># BT클랜원 실시간 랭킹 </div>
        <div class="main-desc">승률이 높은 순서대로 자동 정렬됩니다. (판수가 같으면 승리가 많은 순)</div>
        
        <table class="stat-table">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>닉네임</th>
                    <th>승</th>
                    <th>패</th>
                    <th>승률</th>
                </tr>
            </thead>
            <tbody id="ranking-table-body">
                </tbody>
        </table>
    </div>

    <script>
        // ★형님은 여기 아래 닉네임과 승, 패 숫자만 고치시면 됩니다!
        const clanMembers = [
            [ "타무", 100, 1 ],
            [ "멜로", 100, 2 ],
            [ "보이", 100, 0 ],
            [ "줄라이", 100, 9 ], // 여기 형님 전적!
            [ "엘리트멤버1", 22, 10 ],
            [ "엘리트멤버2", 19, 15 ],
            [ "엘리트멤버3", 30, 28 ],
            [ "엘리트멤버4", 15, 10 ],
            [ "엘리트멤버5", 12, 8 ],
            [ "엘리트멤버6", 8, 4 ],
            [ "엘리트멤버7", 5, 2 ],
            [ "엘리트멤버8", 1, 0 ],
            
            // 활동대원 35명 시작
            [ "활동대원1", 25, 20 ], [ "활동대원2", 14, 14 ], [ "활동대원3", 9, 12 ], [ "활동대원4", 33, 21 ], [ "활동대원5", 18, 16 ],
            [ "활동대원6", 5, 9 ], [ "활동대원7", 21, 15 ], [ "활동대원8", 11, 11 ], [ "활동대원9", 4, 3 ], [ "활동대원10", 0, 2 ],
            [ "활동대원11", 17, 13 ], [ "활동대원12", 22, 25 ], [ "활동대원13", 8, 8 ], [ "활동대원14", 19, 14 ], [ "활동대원15", 30, 32 ],
            [ "활동대원16", 12, 10 ], [ "활동대원17", 7, 5 ], [ "활동대원18", 3, 3 ], [ "활동대원19", 15, 12 ], [ "활동대원20", 26, 24 ],
            [ "활동대원21", 10, 8 ], [ "활동대원22", 6, 7 ], [ "활동대원23", 2, 5 ], [ "활동대원24", 14, 11 ], [ "활동대원25", 21, 19 ],
            [ "활동대원26", 9, 8 ], [ "활동대원27", 5, 4 ], [ "활동대원28", 1, 2 ], [ "활동대원29", 18, 15 ], [ "활동대원30", 22, 20 ],
            [ "활동대원31", 13, 11 ], [ "활동대원32", 7, 9 ], [ "활동대원33", 4, 6 ], [ "활동대원34", 16, 13 ], [ "활동대원35", 20, 18 ],

            // 신입회원 15명 시작
            [ "신입회원1", 10, 5 ], [ "신입회원2", 7, 3 ], [ "신입회원3", 5, 5 ], [ "신입회원4", 4, 2 ], [ "신입회원5", 3, 1 ],
            [ "신입회원6", 2, 2 ], [ "신입회원7", 1, 1 ], [ "신입회원8", 0, 0 ], [ "신입회원9", 6, 4 ], [ "신입회원10", 8, 7 ],
            [ "신입회원11", 5, 4 ], [ "신입회원12", 3, 2 ], [ "신입회원13", 2, 1 ], [ "신입회원14", 1, 3 ], [ "신입회원15", 0, 1 ]
        ];

        // 데이터 계산
        const processed = clanMembers.map(member => {
            const name = member[0];
            const wins = member[1];
            const loses = member[2];
            const total = wins + loses;
            const winRate = total === 0 ? 0 : parseFloat(((wins / total) * 100).toFixed(1));
            return { name, wins, loses, winRate };
        });

        // 승률 정렬
        processed.sort((a, b) => {
            if (b.winRate !== a.winRate) return b.winRate - a.winRate;
            return b.wins - a.wins;
        });

        // 표 화면 그리기
        const tbody = document.getElementById('ranking-table-body');
        processed.forEach((member, index) => {
            const rank = index + 1;
            let rankText = `${rank}등`;
            let rankClass = '';
            let rowClass = '';

            if (rank === 1) {
                rankText = '🥇 1등';
                rankClass = 'rank-1';
                rowClass = 'bg-rank-1';
            } else if (rank === 2) {
                rankText = '🥈 2등';
                rankClass = 'rank-2';
                rowClass = 'bg-rank-2';
            } else if (rank === 3) {
                rankText = '🥉 3등';
                rankClass = 'rank-3';
                rowClass = 'bg-rank-3';
            }

            const row = `
                <tr class="${rowClass}">
                    <td class="${rankClass}">${rankText}</td>
                    <td style="text-align: left; font-weight: 500; color: #f2f3f5;">${member.name}</td>
                    <td style="color: #43b581; font-weight: bold;">${member.wins}</td>
                    <td style="color: #f04747;">${member.loses}</td>
                    <td style="color: #5865f2; font-weight: bold;">${member.winRate}%</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    </script>
</body>
</html>
