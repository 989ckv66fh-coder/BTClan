<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BTClan 실시간 전적 랭킹 사이트</title>
    <meta name="description" content="BT클랜원들의 실시간 전적과 승률 랭킹을 확인하는 공식 페이지입니다.">
    <meta name="keywords" content="BTClan, BT클랜, 클랜전적, 전적랭킹">

    <style>
        body { background-color: #2f3136; color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; min-height: 100vh; }
        
        /* 📂 왼쪽 시즌 카테고리 메뉴 스타일 */
        .sidebar { width: 200px; background-color: #202225; padding: 20px 10px; border-right: 1px solid #40444b; shrink: 0; }
        .sidebar-title { font-size: 16px; font-weight: bold; color: #e5c07b; text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #40444b; }
        .menu-title { font-size: 12px; color: #8e9297; font-weight: bold; margin: 15px 0 5px 5px; text-transform: uppercase; }
        .menu-btn { display: block; width: 100%; background: none; border: none; color: #b9bbbe; text-align: left; padding: 10px; font-size: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .menu-btn:hover { background-color: #34373c; color: #fff; }
        .menu-btn.active { background-color: #5865f2; color: #fff; }

        /* 📊 오른쪽 메인 랭킹판 스타일 */
        .main-content { flex: 1; padding: 15px 20px; padding-bottom: 80px; position: relative; }
        .main-header { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .main-desc { font-size: 14px; color: #b9bbbe; margin-bottom: 15px; }
        
        .stat-table { width: 100%; border-collapse: collapse; text-align: center; }
        .stat-table th, .stat-table td { padding: 10px 5px; font-size: 13px; border-bottom: 1px solid #40444b; }
        .stat-table th:nth-child(1), .stat-table td:nth-child(1) { width: 22%; }
        .stat-table th:nth-child(2), .stat-table td:nth-child(2) { width: 34%; }
        
        .bg-rank-1 { background-color: rgba(241, 196, 15, 0.08); }
        .bg-rank-2 { background-color: rgba(149, 165, 166, 0.08); }
        .bg-rank-3 { background-color: rgba(211, 84, 0, 0.08); }
        .medal { font-size: 16px; }

        /* 방문자 카운터 */
        .visitor-counter {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background-color: #202225;
            border: 1px solid #40444b;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #b9bbbe;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            z-index: 999;
            text-align: right;
            line-height: 1.5;
        }
        .visitor-counter span { font-weight: bold; }
        .visitor-counter .today { color: #43b581; }
        .visitor-counter .total { color: #e5c07b; }
    </style>
</head>
<body>

    <!-- 1. 왼쪽 시즌 카테고리 메뉴 영역 -->
    <div class="sidebar">
        <div class="sidebar-title">★ BT CLAN ★</div>
        <div class="menu-title">시즌 랭킹 카테고리</div>
        <button class="menu-btn active" id="btn-current" onclick="selectCategory('current')">🔥 현재 시즌 실시간</button>
        <button class="menu-btn" id="btn-prev" onclick="selectCategory('prev')">📜 지난 시즌 최종</button>
    </div>

    <!-- 2. 오른쪽 메인 랭킹판 영역 -->
    <div class="main-content">
        <div class="main-header" id="page-title"># BT클랜원 시즌 랭킹</div>
        <div class="main-desc">포인트가 높은 순서대로 정렬됩니다. (판수가 있으면 마이너스 점수라도 0승 0패보다 우위)</div>

        <table class="stat-table">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>닉네임</th>
                    <th>승</th>
                    <th>패</th>
                    <th>승률</th>
                    <th>포인트</th>
                </tr>
            </thead>
            <tbody id="ranking-table-body">
            </tbody>
        </table>
    </div>

    <!-- 우측 하단 방문자 카운터 -->
    <div class="visitor-counter">
        <div>조회수 계측기</div>
        <img src="https://counter.hits.io/hits?url=btclan-ranking-system-unique-counter&style=flat-square&show=hits" alt="Counter" style="display:none;">
        <div>오늘 방문: <span id="count-today" class="today">1</span></div>
        <div>전체 방문: <span id="count-total" class="total">1</span></div>
    </div>

    <script>
        // 기본 보기 상태 ('current': 현재시즌실시간, 'prev': 지난시즌최종)
        let viewMode = 'current';

        // ★형님은 여기에 "현재 진행 중인 시즌 전적"만 지금처럼 입력하시면 됩니다!
        // (1월 1일, 7월 1일이 되면 이 숫자를 싹 다 0, 0으로 리셋하고 새로 입력하시면 됩니다.)
        const clanMembers = [
            [ "SapziL[BT]", 0, 0 ],
            [ "Sun[BT]", 0, 0 ],
            [ "Unique[BT]", 0, 1 ],
            [ "Kyu[BT]", 0, 0 ],
            [ "Pirate[BT]", 1, 1 ],
            [ "HanJin[BT]", 0, 0 ],
            [ "JAVA[BT]", 0, 0 ],
            [ "zzerg[BT]", 0, 0 ],
            [ "heajin[BT]", 0, 0 ],
            [ "Lattee[BT]", 1, 0 ],
            [ "Ocean[BT]", 0, 0 ],
            [ "Sunbee[BT]", 2, 3 ],

            // 활동대원 35명 시작
            [ "Chu[BT]", 0, 0 ], [ "Dkey[BT]", 0, 2 ], [ "Ulrali[BT]", 0, 2 ], [ "Min[BT]", 0, 0 ], [ "Hunt[BT]", 0, 0 ],
            [ "ohno~[BT]", 5, 3 ], [ "gnl[BT]", 1, 0 ], [ "rAy[BT]", 0, 2 ], [ "rjrl[BT]", 0, 0 ], [ "Helper[BT]", 1, 3 ],
            [ "OK[BT]", 0, 0 ], [ "Grit[BT]", 0, 0 ], [ "5s[BT]", 0, 0 ], [ "Zec[BT]", 4, 6 ], [ "02[BT]", 4, 4 ],
            [ "2[BT]", 0, 0 ], [ "Sang[BT]", 0, 0 ], [ "elca[BT]", 3, 3 ], [ "JK[BT]", 0, 0 ], [ "Pong9[BT]", 0, 0 ],
            [ "Jusin[BT]", 0, 0 ], [ "Mom[BT]", 1, 2 ], [ "waassup[BT]", 0, 0 ], [ "ILDO[BT]", 0, 0 ], [ "dodo[BT]", 0, 0 ],
            [ "Sharp1[BT]", 0, 0 ], [ "Saske[BT]", 1, 0 ], [ "gkawnf[BT]", 0, 0 ], [ "GGUNG[BT]", 0, 0 ], [ "Epic[BT]", 0, 0 ],
            [ "dhfl[BT]", 3, 0 ], [ "wisa[BT]", 0, 0 ], [ "hsy[BT]", 0, 0 ], [ "Hana[BT]", 3, 2 ], [ "911[BT]", 0, 0 ],

            // 신입회원 15명 시작
            [ "Yellow[BT]", 0, 0 ], [ "c[BT]", 1, 1 ], [ "Janbari[BT]", 0, 0 ], [ "eodrn[BT]", 0, 0 ], [ "st[BT]", 0, 0 ],
            [ "tamoo[BT]", 2, 3 ], [ "YiTA[BT]", 0, 1 ], [ "Nature[BT]", 0, 0 ], [ "Cherry+[BT]", 0, 0 ], [ "gus[BT]", 0, 0 ],
            [ "k0res[BT]", 4, 1 ], [ "gns[BT]", 0, 0 ], [ "gun[BT]", 0, 0 ], [ "Peri[BT]", 0, 0 ], [ "wns[BT]", 1, 1 ], [ "Sorry[BT]", 3, 2 ],[ "mikseogi[BT]", 0, 1 ],
            [ "Cuzz[BT]", 0, 0 ], [ "UT[BT]", 0, 0 ], [ "Like[BT]", 0, 0 ], [ "Sniper[BT]", 0, 0 ], [ "Melo[BT]", 0, 0 ], [ "Boy[BT]", 0, 0 ],
            [ "Visage[BT]", 0, 0 ], [ "1[BT]", 0, 0 ], [ "EunGyo[BT]", 0, 0 ], [ "qktkr[BT]", 0, 0 ], [ "KimGeoMi[BT]", 0, 0 ], [ "RINKING[BT]", 4, 1 ], [ "Tenga[BT]", 3, 3 ]
        ];

        // 연도와 월을 계산해 현재 시즌명과 지난 시즌명을 가져오는 함수
        function getSeasonNames() {
            const now = new Date();
            const year = now.getFullYear();
            const isSecondHalf = now.getMonth() >= 6; // 7월~12월은 하반기

            let currentSeason = "";
            let prevSeason = "";

            if (isSecondHalf) {
                currentSeason = `${year} 하반기`;
                prevSeason = `${year} 상반기`;
            } else {
                currentSeason = `${year} 상반기`;
                prevSeason = `${year - 1} 하반기`;
            }

            return { currentSeason, prevSeason };
        }

        // 시즌제 자동 감지 및 백업 연동 시스템
        function getRankData() {
            const seasons = getSeasonNames();
            const currentSeasonKey = "bt_season_" + seasons.currentSeason;
            const prevSeasonKey = "bt_season_snapshot";

            let savedSnapshot = localStorage.getItem(prevSeasonKey);
            let savedSeasonTrack = localStorage.getItem('bt_current_season_track');

            // 7월 1일 혹은 1월 1일이 되어 시즌이 완전히 교체되었을 때 구동
            if (!savedSnapshot || savedSeasonTrack !== currentSeasonKey) {
                // 직전 시즌까지 형님이 적어둔 최종 데이터를 영구 박제 처리
                if (savedSeasonTrack) {
                    localStorage.setItem(prevSeasonKey, localStorage.getItem('bt_current_data_backup') || JSON.stringify(clanMembers));
                } else {
                    localStorage.setItem(prevSeasonKey, JSON.stringify(clanMembers));
                }
                localStorage.setItem('bt_current_season_track', currentSeasonKey);
                savedSnapshot = localStorage.getItem(prevSeasonKey);
            }

            // 실시간 백업본 최신화
            localStorage.setItem('bt_current_data_backup', JSON.stringify(clanMembers));

            const pastDataArray = JSON.parse(savedSnapshot);

            // 어떤 시즌 데이터를 화면에 뿌릴지 선택
            let targetData = clanMembers; 
            if (viewMode === 'prev') {
                targetData = pastDataArray; 
            }

            return targetData.map(member => {
                const name = member[0];
                const wins = member[1];
                const loses = member[2];
                const total = wins + loses;
                const winRate = total === 0 ? 0 : parseFloat(((wins / total) * 100).toFixed(1));
                const points = (wins * 100) + (loses * -50); 

                return { name, wins, loses, winRate, points, total };
            });
        }

        // 랭킹 테이블 빌드 함수
        function renderRanking() {
            const seasons = getSeasonNames();

            // 왼쪽 메뉴 버튼 레이블 자동 갱신
            document.getElementById('btn-current').innerText = `🔥 ${seasons.currentSeason} 실시간`;
            document.getElementById('btn-prev').innerText = `📜 ${seasons.prevSeason} 최종`;

            const titleEl = document.getElementById('page-title');
            if (viewMode === 'current') titleEl.innerText = `# BT클랜원 시즌 랭킹 (${seasons.currentSeason})`;
            if (viewMode === 'prev') titleEl.innerText = `# BT클랜원 지난 시즌 랭킹 (${seasons.prevSeason} 최종 명예의 전당)`;

            const processed = getRankData();

            // 형님 요청 특수 정렬 (0승 0패 하위 배치 및 판수 우선권 적용)
            processed.sort((a, b) => {
                if (a.total > 0 && b.total > 0) {
                    if (b.points !== a.points) return b.points - a.points;
                    return b.winRate - a.winRate;
                }
                if (a.total > 0 && b.total === 0) return -1;
                if (b.total > 0 && a.total === 0) return 1;
                return 0;
            });

            const tbody = document.getElementById('ranking-table-body');
            tbody.innerHTML = ''; 

            processed.forEach((member, index) => {
                const rank = index + 1;
                let rowClass = '';
                let rankText = rank;

                if (rank === 1) { rowClass = 'bg-rank-1'; rankText = '<span class="medal">🥇</span> 1'; } 
                else if (rank === 2) { rowClass = 'bg-rank-2'; rankText = '<span class="medal">🥈</span> 2'; } 
                else if (rank === 3) { rowClass = 'bg-rank-3'; rankText = '<span class="medal">🥉</span> 3'; }

                const pointColor = member.points >= 0 ? '#e5c07b' : '#ff6b6b';

                const row = `
                    <tr class="${rowClass}">
                        <td style="font-weight: bold; color: #fff;">${rankText}</td>
                        <td style="text-align: left; font-weight: 500; color: #f2f3f5;">${member.name}</td>
                        <td style="color: #43b581; font-weight: bold;">${member.wins}</td>
                        <td style="color: #f04747;">${member.loses}</td>
                        <td style="color: #5865f2; font-weight: bold;">${member.winRate}%</td>
                        <td style="color: ${pointColor}; font-weight: bold;">${member.points.toLocaleString()} pt</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // 메뉴 선택 토글 기능
        function selectCategory(mode) {
            viewMode = mode;
            
            document.getElementById('btn-current').classList.remove('active');
            document.getElementById('btn-prev').classList.remove('active');
            
            if(mode === 'current') document.getElementById('btn-current').classList.add('active');
            if(mode === 'prev') document.getElementById('btn-prev').classList.add('active');

            renderRanking();
        }

        // 카운터 스크립트
        function updateCounter() {
            let totalViews = localStorage.getItem('bt_total_views') || 24;
            let todayViews = localStorage.getItem('bt_today_views') || 3;
            let lastDate = localStorage.getItem('bt_last_date');
            
            const now = new Date();
            const currentDate = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();

            if (lastDate !== currentDate) {
                todayViews = 0;
                localStorage.setItem('bt_last_date', currentDate);
            }

            totalViews = parseInt(totalViews) + 1;
            todayViews = parseInt(todayViews) + 1;

            localStorage.setItem('bt_total_views', totalViews);
            localStorage.setItem('bt_today_views', todayViews);

            document.getElementById('count-today').innerText = todayViews.toLocaleString();
            document.getElementById('count-total').innerText = totalViews.toLocaleString();
        }
        
        window.onload = function() {
            renderRanking();
            updateCounter();
        };
    </script>
</body>
</html>
