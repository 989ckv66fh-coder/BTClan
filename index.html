<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="naver-site-verification" content="bbf376e45c45fe6397d074738e24bb4107e7f819" />

    <title>클랜원 실시간 전적 랭킹</title>
    <style>
        body { background-color: #2f3136; color: #fff; font-family: sans-serif; }
        .main-content { padding: 15px 10px; }
        .main-header { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .main-desc { font-size: 14px; color: #b9bbbe; margin-bottom: 15px; }
        .stat-table { width: 100%; border-collapse: collapse; text-align: center; }
        .stat-table th, .stat-table td { padding: 10px 5px; font-size: 13px; border-bottom: 1px solid #40444b; }
        .stat-table th:nth-child(1), .stat-table td:nth-child(1) { width: 22%; } /* 순위칸 너비조절 */
        .stat-table th:nth-child(2), .stat-table td:nth-child(2) { width: 34%; } /* 닉네임칸 너비조절 */
        
        /* 상위권 배경색 하이라이트 */
        .bg-rank-1 { background-color: rgba(241, 196, 15, 0.08); }
        .bg-rank-2 { background-color: rgba(149, 165, 166, 0.08); }
        .bg-rank-3 { background-color: rgba(211, 84, 0, 0.08); }
        
        /* 메달 이모지 크기 키우기 */
        .medal { font-size: 16px; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="main-header"># BT클랜원 실시간 랭킹 </div>
        <div class="main-desc">포인트가 높은 순서대로 정렬됩니다. (판수가 있으면 마이너스 점수라도 0승 0패보다 우위)</div>

        <table class="stat-table">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>닉네임</th>
                    <th>승</th>
                    <th>패</th>
                    <th>승률</th>
                    <th>포인트</th>
                </tr>
            </thead>
            <tbody id="ranking-table-body">
            </tbody>
        </table>
    </div>

    <script>
        // ★형님은 여기 아래 닉네임과 승, 패 숫자만 고치시면 됩니다!
        const clanMembers = [
            [ "SapziL[BT]", 0, 0 ],
            [ "Sun[BT]", 0, 0 ],
            [ "Unique[BT]", 0, 0 ],
            [ "Kyu[BT]", 0, 0 ], // 여기 형님 전적!
            [ "Pirate[BT]", 0, 0 ],
            [ "HanJin[BT]", 0, 0 ],
            [ "JAVA[BT]", 0, 0 ],
            [ "zzerg[BT]", 0, 0 ],
            [ "heajin[BT]", 0, 0 ],
            [ "Lattee[BT]", 0, 0 ],
            [ "Ocean[BT]", 0, 0 ],
            [ "Sunbee[BT]", 0, 0 ],  // 여기 형님 전적!

            // 활동대원 35명 시작
            [ "Chu[BT]", 0, 0 ], [ "Dkey[BT]", 0, 0 ], [ "Ulrali[BT]", 0, 0 ], [ "Min[BT]", 0, 0 ], [ "Hunt[BT]", 0, 0 ],
            [ "ohno~[BT]", 0, 0 ], [ "gnl[BT]", 0, 0 ], [ "rAy[BT]", 0, 0 ], [ "rjrl[BT]", 0, 0 ], [ "Helper[BT]", 0, 0 ],
            [ "OK[BT]", 0, 0 ], [ "Grit[BT]", 0, 0 ], [ "5s[BT]", 0, 0 ], [ "Zec[BT]", 0, 0 ], [ "02[BT]", 0, 0 ],
            [ "2[BT]", 0, 0 ], [ "Sang[BT]", 0, 0 ], [ "elca[BT]", 0, 0 ], [ "JK[BT]", 0, 0 ], [ "Pong9[BT]", 0, 0 ],
            [ "Jusin[BT]", 0, 0 ], [ "Mom[BT]", 0, 0 ], [ "waassup[BT]", 0, 0 ], [ "ILDO[BT]", 0, 0 ], [ "dodo[BT]", 0, 0 ],
            [ "Sharp1[BT]", 0, 0 ], [ "Saske[BT]", 0, 0 ], [ "gkawnf[BT]", 0, 0 ], [ "GGUNG[BT]", 0, 0 ], [ "Epic[BT]", 0, 0 ],
            [ "dhfl[BT]", 0, 0 ], [ "wisa[BT]", 0, 0 ], [ "hsy[BT]", 0, 0 ], [ "Hana[BT]", 0, 0 ], [ "911[BT]", 0, 0 ],

            // 신입회원 15명 시작
            [ "Yellow[BT]", 0, 0 ], [ "c[BT]", 0, 0 ], [ "Janbari[BT]", 0, 0 ], [ "eodrn[BT]", 0, 0 ], [ "st[BT]", 0, 0 ],
            [ "tamoo[BT]", 0, 0 ], [ "YiTA[BT]", 0, 0 ], [ "Nature[BT]", 0, 0 ], [ "Cherry+[BT]", 0, 0 ], [ "gus[BT]", 0, 0 ],
            [ "k0res[BT]", 0, 0 ], [ "gns[BT]", 0, 0 ], [ "gun[BT]", 0, 0 ], [ "Peri[BT]", 0, 0 ], [ "wns[BT]", 0, 0 ], [ "Sorry[BT]", 0, 0 ],[ "mikseogi[BT]", 0, 0 ],[ "Cuzz[BT]", 0, 0 ],
            [ "UT[BT]", 0, 0 ], [ "Like[BT]", 0, 0 ], [ "Sniper[BT]", 0, 0 ], [ "Melo[BT]", 0, 0 ], [ "Boy[BT]", 0, 0 ], [ "Visage[BT]", 0, 0 ], 
            [ "1[BT]", 0, 0 ], [ "EunGyo[BT]", 0, 0 ], [ "qktkr[BT]", 0, 0 ], [ "KimGeoMi[BT]", 0, 0 ]
        ];

        // 1. 데이터 계산 (낙오자 없이 모두 포함)
        const processed = clanMembers.map(member => {
            const name = member[0];
            const wins = member[1];
            const loses = member[2];
            const total = wins + loses;
            const winRate = total === 0 ? 0 : parseFloat(((wins / total) * 100).toFixed(1));
            const points = (wins * 100) + (loses * -50); 
            
            return { name, wins, loses, winRate, points, total };
        });

        // 2. 형님 맞춤형 특수 정렬 규칙
        processed.sort((a, b) => {
            // 둘 다 전적이 한판이라도 있는 경우 -> 포인트 높은 순
            if (a.total > 0 && b.total > 0) {
                if (b.points !== a.points) return b.points - a.points;
                return b.winRate - a.winRate;
            }
            // a만 전적이 있고 b는 0승 0패인 경우 -> 마이너스 점수라도 전적 있는 a가 위로!
            if (a.total > 0 && b.total === 0) return -1;
            // b만 전적이 있고 a는 0승 0패인 경우 -> b가 위로!
            if (b.total > 0 && a.total === 0) return 1;
            
            // 둘 다 0승 0패인 경우 -> 순서 그대로 유지
            return 0;
        });

        // 3. 표 화면 그리기
        const tbody = document.getElementById('ranking-table-body');
        processed.forEach((member, index) => {
            const rank = index + 1;
            let rowClass = '';
            let rankText = rank;

            if (rank === 1) {
                rowClass = 'bg-rank-1';
                rankText = '<span class="medal">🥇</span> 1';
            } else if (rank === 2) {
                rowClass = 'bg-rank-2';
                rankText = '<span class="medal">🥈</span> 2';
            } else if (rank === 3) {
                rowClass = 'bg-rank-3';
                rankText = '<span class="medal">🥉</span> 3';
            }

            const pointColor = member.points >= 0 ? '#e5c07b' : '#ff6b6b';

            const row = `
                <tr class="${rowClass}">
                    <td style="font-weight: bold; color: #fff;">${rankText}</td>
                    <td style="text-align: left; font-weight: 500; color: #f2f3f5;">${member.name}</td>
                    <td style="color: #43b581; font-weight: bold;">${member.wins}</td>
                    <td style="color: #f04747;">${member.loses}</td>
                    <td style="color: #5865f2; font-weight: bold;">${member.winRate}%</td>
                    <td style="color: ${pointColor}; font-weight: bold;">${member.points.toLocaleString()} pt</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    </script>
</body>
</html>
